<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immediate UI Mode Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #10b981;
      --primary-hover: #059669;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at top left, #064e3b 0%, transparent 40%),
                        radial-gradient(circle at bottom right, #020617 0%, transparent 40%);
    }
    .container {
      max-width: 500px;
      width: 90%;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      padding: 3.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      transition: all 0.3s ease;
    }
    .tagline {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #34d399, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
    }
    .fallback-form {
      display: none;
      text-align: left;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #cbd5e1;
    }
    input {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
    }
    .status {
      font-family: monospace;
      font-size: 0.85rem;
      color: #94a3b8;
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 8px;
      text-align: left;
      margin-top: 2rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="tagline">New Web API</span>
    <h1>Immediate UI Mode</h1>
    <p>Seamlessly check for saved passkeys or passwords before forcing the user to type in a login form.</p>
    
    <button id="create-passkey-btn" style="background: #6366f1; margin-bottom: 1rem;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
      Create Test Passkey
    </button>

    <button id="sign-in-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
      Sign In
    </button>
    
    <div id="fallback-form" class="fallback-form">
      <h3 style="margin-top: 0;">Sign in with email</h3>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••">
      </div>
      <button style="background: #3b82f6;">Continue</button>
    </div>
    
    <div class="status" id="status">Status: Checking support...</div>
  </div>

  <script>
    const signInBtn = document.getElementById('sign-in-btn');
    const createPasskeyBtn = document.getElementById('create-passkey-btn');
    const fallbackForm = document.getElementById('fallback-form');
    const statusDiv = document.getElementById('status');

    function logStatus(msg) {
      statusDiv.textContent += '\n> ' + msg;
      console.log(msg);
    }

    // Check support on load
    async function checkSupport() {
      try {
        if (!window.PublicKeyCredential || !PublicKeyCredential.getClientCapabilities) {
          logStatus('WebAuthn API or getClientCapabilities not supported.');
          return;
        }
        const capabilities = await PublicKeyCredential.getClientCapabilities();
        if (capabilities.immediateGet) {
          logStatus('Immediate UI mode is supported! Ready to sign in.');
        } else {
          logStatus('Immediate UI mode is NOT supported by this browser yet.');
        }
      } catch (e) {
        logStatus('Error checking support: ' + e.message);
      }
    }
    
    // Slight delay so the user can read the UI first
    setTimeout(checkSupport, 500);

    createPasskeyBtn.addEventListener('click', async (event) => {
      event.preventDefault();
      logStatus('Creating a test passkey...');
      try {
        const userId = new Uint8Array(16);
        crypto.getRandomValues(userId);
        const challenge = new Uint8Array(32);
        crypto.getRandomValues(challenge);

        const cred = await navigator.credentials.create({
          publicKey: {
            challenge: challenge,
            rp: {
              name: "Immediate UI Demo",
              id: window.location.hostname || "localhost",
            },
            user: {
              id: userId,
              name: "testuser@example.com",
              displayName: "Test User",
            },
            pubKeyCredParams: [
              { type: "public-key", alg: -7 },
              { type: "public-key", alg: -257 }
            ],
            authenticatorSelection: {
              authenticatorAttachment: "platform",
              residentKey: "required",
              userVerification: "preferred"
            }
          }
        });
        logStatus('Passkey created successfully! ID: ' + cred.id.substring(0, 15) + '...');
      } catch (e) {
        logStatus('Error creating passkey: ' + e.message);
      }
    });

    signInBtn.addEventListener('click', async (event) => {
      event.preventDefault();
      logStatus('Requesting immediate credentials...');
      
      try {
        const serverGeneratedChallenge = new Uint8Array(32);
        crypto.getRandomValues(serverGeneratedChallenge);
        
        const cred = await navigator.credentials.get({
          password: true,
          publicKey: {
            challenge: serverGeneratedChallenge,
            rpId: window.location.hostname || 'localhost'
          },
          uiMode: 'immediate',
        });
        
        if (cred) {
          logStatus('Success! Credential retrieved: ' + (cred.id || 'password'));
          signInBtn.innerHTML = '✅ Signed In Successfully';
          signInBtn.style.background = '#059669';
        }
      } catch (error) {
        logStatus('Result: ' + error.name + ' - ' + error.message);
        
        // If no credentials available, it throws NotAllowedError
        if (error.name === 'NotAllowedError' || error.name === 'NotSupportedError') {
          logStatus('No local credentials found. Falling back to standard UI...');
          signInBtn.style.display = 'none';
          fallbackForm.style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
