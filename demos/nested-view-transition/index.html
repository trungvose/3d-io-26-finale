<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nested View Transitions</title>
  <style>
/* CSS from user */
:root {
  view-transition-name: none;
}
::view-transition {
  pointer-events: none;
}
::view-transition-group(*) {
  animation-duration: 2.5s;
/*  outline: 2px dotted lime; */
}
::view-transition-old(*) {
  display: none;
}
::view-transition-new(*) {
  animation: none;
}

ul li {
  view-transition-name: match-element;
  view-transition-class: album;
}

/* A. To enable clipping of the remaining items while moving an item across lists*/
ul {
  view-transition-name: match-element; /* (A. 1/4) Capture the ul */
  view-transition-group: contain; /* (A. 2/4) Contain all captured children */
  view-transition-class: list; /* (A. 3/4) For styling Purposes */
}
::view-transition-group-children(.list) {
  overflow: clip; /* (A. 4/4) Clip albums contained in the list */
}

/* To prevent names of the li elements from bleeding out into
   the outer transition when doing a swap. When a swap is done,
   capturing the uls themselves is sufficient. */
/* However, this cannot be set for the move-element transition,
   as it prevents anything inside the uls from being captured then
   so we set this conditionally via JS (only on the swap transition) */
ul {  
/*  view-transition-scope: all; */
}

/* To allow the lists to move */
/* This is needed because the uls have `view-transition-scope: all;` which prevents them from getting captured */
div:has(> ul) {
  view-transition-name: match-element;
}

/* This prevents the clicked-element from getting
   painted outside of the list-wrapper snapshot */
.wrapper {
  view-transition-name: lists-wrapper;
}
::view-transition-group(lists-wrapper) {
  overflow: clip;
}


#clicked-element {
  view-transition-name: clicked-element !important;
  
  /* The clicked element moves across lists, so it cannot be contained by 
     one list … so we need to lift it out of there. */
  view-transition-group: lists-wrapper;
}

/* Paint on top of both lists */
::view-transition-group(clicked-element) {
  z-index: 100;
}





body {
  padding: 1rem;
  font-size: 2em;
}

ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 1rem;

  border: 2px solid;
  padding: 1rem;
  border-radius: 0.25em;
  margin: 1rem 0;
  background: Canvas;
}

li {
  user-select: none;
  border: 2px solid;
  padding: 1rem;
  border-radius: 0.25em;
  
  display: flex;
  gap: 1rem;
  align-items: center;
  background: Canvas;
  
  &:hover {
    border-color: SelectedItem;
    cursor: pointer;
  }
  
  img {
    width: 4rem;
    height: 4rem;
  }
}



ul {
  height: 90vh;
  max-height: 20rem;
  overflow-y: scroll;
}



button, input {
  font-family: inherit;
  font-size: inherit;
}

.wrapper {
  display: flex;
  flex-direction: row;
  gap: 1rem;
  width: 80vw;
  max-width: 60rem;
  
  &.reversed {
    flex-direction: row-reverse;
  }
  
  > * {
    flex: 1;
  }
  > button {
    flex: 0;
    align-self: center;
  }
}

@layer reset {
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
}

@layer layout {
  :root {
    color-scheme: dark;
    font-family: system-ui;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    display: grid;
    place-content: center;
  }
}

@layer warning {
  .warnings {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    right: 1rem;
    text-align: center;
    display: none;
  }
  .warning {
    display: block;
    margin: 0 auto;
    width: fit-content;
    font-size: 1rem;
    padding: 1em;
    border: 1px solid #333;
    color: black;
    background: rgba(255, 255, 205, 0.8);
    text-align: center;
  }

  .warning > :first-child {
    margin-top: 0;
  }

  .warning > :last-child {
    margin-bottom: 0;
  }

  .warning a {
    color: blue;
  }
  .warning--info {
    border: 1px solid #123456;
    background: rgb(205 230 255 / 0.8);
  }
  .warning--alarm {
    border: 1px solid red;
    background: #ff000010;
  }

  .credits {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.6);
    background: rgba(0, 0, 0, 0.5);
    padding: 0.5rem 1rem;
    border-radius: 0.25rem;
    z-index: 1000;
  }
  
  .credits a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: underline;
  }
}
  </style>
</head>
<body>
  <!-- HTML from user -->
  <div class="wrapper">
    <div>
      <ul id="list1">
        <li><img draggable="false" src="images/1.jpg" width="1200" height="1200" /> album 1</li>
        <li><img draggable="false" src="images/2.jpg" width="1200" height="1200" /> album 2</li>
        <li><img draggable="false" src="images/3.jpg" width="1200" height="1200" /> album 3</li>
        <li><img draggable="false" src="images/4.jpg" width="1200" height="1200" /> album 4</li>
        <li><img draggable="false" src="images/5.jpg" width="1200" height="1200" /> album 5</li>
      </ul>
      <button>REORDER</button>
    </div>

    <button id="swap">↔</button>
    
    <div>
      <ul id="list2">
        <li><img draggable="false" src="images/6.jpg" width="1200" height="1200" /> album 6</li>
        <li><img draggable="false" src="images/7.jpg" width="1200" height="1200" /> album 7</li>
        <li><img draggable="false" src="images/8.jpg" width="1200" height="1200" /> album 8</li>
        <li><img draggable="false" src="images/9.jpg" width="1200" height="1200" /> album 9</li>
        <li><img draggable="false" src="images/10.jpg" width="1200" height="1200" /> album 10</li>
      </ul>
      <button>REORDER</button>
    </div>
  </div>

  <div class="warnings">
    <div class="warning">
      <p>⚠️ Your browser does not support Element-Scoped View Transitions.<br>Try Chrome 147 or newer. Alternatively, <a href="https://developer.chrome.com/blog/element-scoped-view-transitions/video/inner-and-outer-view-transition.mp4" target="_top">check out a recording</a>.</p>
    </div>
  </div>

  <div class="credits">
    Images provided by <a href="https://unsplash.com/" target="_blank">Unsplash</a> via <a href="https://picsum.photos/" target="_blank">Lorem Picsum</a>
  </div>

  <script>
    /* JS from user */
    function shuffleElements(container) {
      const elements = Array.from(container.children);

      // Shuffle the elements randomly
      for (let i = elements.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [elements[i], elements[j]] = [elements[j], elements[i]];
      }

      // Append the shuffled elements back into the container
      elements.forEach(element => container.appendChild(element));
    }

    document.querySelectorAll('button:not(#swap)').forEach($button => {
      $button.addEventListener('click', async (e) => {
        const $list = $button.previousElementSibling;
        const t = $list.startViewTransition(() => {
          shuffleElements($list);
        });
      });
    });

    let lastClickedElements = [];
    document.querySelectorAll('li').forEach($li => {
      $li.addEventListener('click', async (e) => {
        // Store clicked element
        lastClickedElements = [ $li, ...lastClickedElements].slice(0, 2);
        
        // Check if it was a double click on the same element
        // If not, bail out
        if (lastClickedElements.length < 2) return;
        if (lastClickedElements[0] !== lastClickedElements[1]) return;
        
        // Determine where to move from and to
        const $clickedElement = lastClickedElements[0];
        const $sourceParentList = $clickedElement.parentElement;
        const $targetParentList = document.querySelector(`ul:not(#${$sourceParentList.getAttribute('id')})`);
        
        // Mark element as the clicked one
        $clickedElement.setAttribute('id', 'clicked-element');

        // Move it
        const t = document.querySelector('.wrapper').startViewTransition(() => {
          $targetParentList.moveBefore($clickedElement, $targetParentList.firstElementChild);
        });
        
        // Reset for next
        lastClickedElements = [];
      
        await t.finished;
        $clickedElement.removeAttribute('id');
      });
    });

    document.querySelectorAll('button#swap').forEach($button => {
      $button.addEventListener('click', async (e) => {
        
        const $lists = document.querySelectorAll('ul');
        
        // Because the list items don’t need to be captured
        // we temp apply `view-transition-scope: all;` on them
        $lists.forEach($list => {
          $list.style.viewTransitionScope = 'all';
        });
        
        const t = document.querySelector('.wrapper').startViewTransition(() => {
          document.querySelector('.wrapper').classList.toggle('reversed');
        }); 
        
        // Cleanup the names
        await t.finished;
        $lists.forEach($list => {
          $list.style.viewTransitionScope = '';
        });
      });
    });

    if (!Element.prototype.startViewTransition) {
      document.querySelector('.warnings').style.display = 'block';
    }
  </script>
</body>
</html>
