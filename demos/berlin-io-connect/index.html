<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Berlin IO Connect</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .slides {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 10;
    }

    /* Fullscreen image styles */
    .slide.image-slide {
      padding: 0;
    }

    .slide.image-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Ensures the whole image is visible and scaled to max size */
    }

    /* Title slide */
    .title-slide {
      text-align: center;
      background: #000;
    }

    .title-slide h1 {
      font-size: 64px;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 16px 0;
    }

    .title-slide p {
      font-size: 24px;
      font-weight: 300;
      color: #888;
      margin: 0;
    }

    /* Link overlay */
    .slide-link {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 400;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.2s ease;
      z-index: 20;
    }

    .slide-link:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* Invisible navigation areas */
    .nav-area {
      position: absolute;
      top: 0;
      height: 100%;
      width: 25%;
      z-index: 50;
      cursor: pointer;
    }

    .nav-left {
      left: 0;
    }

    .nav-right {
      right: 0;
    }
  </style>
</head>

<body>
  <!-- Invisible click areas for clean navigation without visible buttons -->
  <div class="nav-area nav-left" id="prev" title="Previous Slide"></div>
  <div class="nav-area nav-right" id="next" title="Next Slide"></div>

  <div class="slides">
    <div class="slide image-slide active">
      <img src="dom-structure.png" alt="DOM Structure">
    </div>

    <div class="slide image-slide">
      <img src="mcp-flow.png" alt="DOM Structure">
    </div>

    <div class="slide image-slide">
      <img src="slide2.png" alt="AI Tool Growth">
    </div>

    <div class="slide image-slide">
      <img src="slide1.png" alt="Model Gap">
      <a class="slide-link" href="https://aifoc.us/model-gap" target="_blank">View on aifoc.us</a>
    </div>


  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    function showSlide(index) {
      slides[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
    }

    document.getElementById('prev').addEventListener('click', () => showSlide(current - 1));
    document.getElementById('next').addEventListener('click', () => showSlide(current + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.code === 'Space') {
        showSlide(current + 1);
      } else if (e.key === 'ArrowLeft') {
        showSlide(current - 1);
      }
    });
  </script>
</body>

</html>
